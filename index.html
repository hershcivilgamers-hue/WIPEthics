<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>CAIRO.AIC — Automated Identity &amp; Clearance</title>

  <!-- IBM Plex — the registry type system: Serif (documents & headings),
       Sans (interface), Mono (designations, IDs, system voice). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheets, loaded in cascade order: tokens first, detail last. -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/dossier.css" />
  <link rel="stylesheet" href="styles/surveillance.css" />
  <link rel="stylesheet" href="styles/tribunals.css" />
  <link rel="stylesheet" href="styles/compartments.css" />
  <link rel="stylesheet" href="styles/operations.css" />
</head>
<body>
  <!-- The application renders into this root. -->
  <div id="app"></div>

  <!-- Single module entry point; it imports everything else. -->
  <script type="module" src="js/app.js"></script>

  <!-- Shown only if the browser can't run ES modules (very old browsers). -->
  <noscript>
    <p style="color:#e2e6ec;font-family:sans-serif;padding:2rem;">
      CAIRO.AIC requires JavaScript. Please enable it to continue.
    </p>
  </noscript>
</body>
</html>
